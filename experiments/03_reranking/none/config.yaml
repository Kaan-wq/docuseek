# experiments/03_reranking/none/config.yaml
# ------------------------------------
# Hybrid retrieval with no reranker. Baseline for reranking experiments.

name: 03_reranking/none
description: >
  Hybrid RRF retrieval with semantic chunking and no reranker.
  Baseline against which ColBERT and cross-encoder gains are measured.

chunker:
  algorithm: semantic
  chunk_size: 500
  context_aware: false
  threshold: 0.75
  min_chunk_size: 100
  window_size: 5

retriever:
  mode: hybrid
  rrf_k: 60

reranker:
  enabled: false

eval:
  gold_set_path: data/eval/gold_set_v1.jsonl
  k_primary: 10
  k_recall: 100