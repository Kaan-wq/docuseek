# experiments/03_reranking/cross_encoder/config.yaml
# ------------------------------------
# Cross-encoder reranker on top of hybrid retrieval.
# Isolates cross-encoder reranking gain and latency cost over no-reranker baseline.

name: 03_reranking/cross_encoder
description: >
  Cross-encoder reranking over hybrid RRF retrieval with semantic chunking.
  Measures NDCG@10 gain and reranker latency cost against the no-reranker baseline.

chunker:
  algorithm: semantic
  chunk_size: 500
  context_aware: false
  threshold: 0.75
  min_chunk_size: 100
  window_size: 5

retriever:
  mode: hybrid
  rrf_k: 60

reranker:
  enabled: true
  method: cross_encoder

eval:
  gold_set_path: data/eval/gold_set_v1.jsonl
  k_primary: 10
  k_recall: 100