# experiments/02_retrieval/hybrid/config.yaml
# ------------------------------------
# Hybrid RRF retrieval against the winning chunker from experiment 01.
# Combines dense and BM25 rankings to measure fusion gain over each alone.

name: 02_retrieval/hybrid
description: >
  Hybrid RRF retrieval with semantic chunking against gold_set_v1.jsonl.

chunker:
  algorithm: semantic
  chunk_size: 500
  context_aware: false
  threshold: 0.75
  min_chunk_size: 100
  window_size: 5

retriever:
  mode: hybrid
  rrf_k: 60

eval:
  gold_set_path: data/eval/gold_set_v1.jsonl
  k_primary: 10
  k_recall: 100