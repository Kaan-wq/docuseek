# experiments/01_chunking/document_structure/config.yaml
# ------------------------------------
# Markdown header chunker, dense-only retrieval, no reranking, no query
# strategies, no prompt engineering. All technique flags are explicitly set to false.

name: 01_chunking/document_structure
description: >
  Records markdown header chunking numbers against gold_set_v1.jsonl.

chunker:
  algorithm: markdown
  chunk_size: 500
  chunk_overlap: 50

retriever:
  mode: dense
  rrf_k: 60

eval:
  gold_set_path: data/eval/gold_set_v1.jsonl
  k_primary: 10
  k_recall: 100