# experiments/01_chunking/semantic/config.yaml
# ------------------------------------
# Semantic chunker, dense-only retrieval, no reranking, no query
# strategies, no prompt engineering. All technique flags are explicitly set to false.

name: 01_chunking/semantic
description: >
  Records semantic chunking numbers against gold_set_v1.jsonl.

chunker:
  algorithm: semantic
  chunk_size: 500
  chunk_overlap: 50
  context_aware: false
  threshold: 0.75
  min_chunk_size: 100
  window_size: 2

retriever:
  mode: dense
  rrf_k: 60

eval:
  gold_set_path: data/eval/gold_set_v1.jsonl
  k_primary: 10
  k_recall: 100